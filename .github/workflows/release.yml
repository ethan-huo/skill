name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - run: bun install
      - run: bun run check
      - run: bun run build

      - name: Read package version
        id: package-version
        run: |
          version="$(bun -e 'const packageJson = await Bun.file("package.json").json(); console.log(packageJson.version);')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate pushed tag
        if: github.ref_type == 'tag'
        run: |
          expected="v${{ steps.package-version.outputs.version }}"
          if [ "${{ github.ref_name }}" != "$expected" ]; then
            echo "Pushed tag ${{ github.ref_name }} does not match package.json version $expected" >&2
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
